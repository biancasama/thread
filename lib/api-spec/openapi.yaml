openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: thread
    description: Thread AI parsing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /thread/parse:
    post:
      operationId: parseThread
      tags: [thread]
      summary: Parse multimodal thought fragments into a structured thread using Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseThreadBody"
      responses:
        "200":
          description: Parsed thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedThread"
        "422":
          description: Parsing failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Fragment:
      type: object
      properties:
        type:
          type: string
          enum: [text, image]
          description: The type of fragment
        content:
          type: string
          description: Text content or base64 data URL for images
      required:
        - type
        - content
    ParseThreadBody:
      type: object
      properties:
        fragments:
          type: array
          items:
            $ref: "#/components/schemas/Fragment"
          description: Array of thought fragments (text and/or images)
      required:
        - fragments
    ParsedThread:
      type: object
      properties:
        thread_title:
          type: string
        goal:
          type: string
        current_step:
          type: string
        important_context:
          type: string
        next_actions:
          type: array
          items:
            type: string
        priority:
          type: string
          enum: [low, medium, high]
      required:
        - thread_title
        - goal
        - current_step
        - important_context
        - next_actions
        - priority
    ParseError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
